name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify synced workspace versions
        run: |
          npm run workspace:sync-versions
          git diff --exit-code -- package.json packages/*/package.json

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish workspaces
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          packages=(
            "@arevs/core"
            "@arevs/utils"
            "@arevs/geo"
            "@arevs/flags"
            "@arevs/places"
            "@arevs/maps"
            "@arevs/astronomy"
            "@arevs/space"
            "@arevs/data"
          )

          for pkg in "${packages[@]}"; do
            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${pkg}@${version}; already published."
              continue
            fi

            echo "Publishing ${pkg}@${version}"
            npm publish --workspace "${pkg}" --access public --provenance
          done
